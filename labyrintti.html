<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="icons/favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="icons/favicon.ico" type="image/x-icon">
  
  <title>Labyrinttipeli | Yhdisys R.Y.</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 1.5rem;
      padding: 1.75rem 1.25rem 3.5rem;
      background: radial-gradient(circle at 50% 10%, rgba(63, 94, 251, 0.25), rgba(8, 10, 20, 0.95) 65%);
      color: #f5f6ff;
    }
    .back-link {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 50;
      padding: 0.5rem 1.1rem;
      border-radius: 999px;
      background: rgba(18, 26, 52, 0.85);
      border: 1px solid rgba(122, 169, 255, 0.4);
      color: #dfe9ff;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.8rem;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .back-link:hover,
    .back-link:focus {
      background: rgba(122, 169, 255, 0.35);
      transform: translateY(-2px);
    }
    header {
      max-width: 720px;
      text-align: center;
    }
    header h1 {
      margin: 0 0 0.6rem;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      letter-spacing: 0.03em;
    }
    header p {
      margin: 0.25rem 0;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.85);
    }
    #gameWrapper {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    canvas {
      border-radius: 12px;
      background: linear-gradient(180deg, #0f1323, #05060c);
      border: 2px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
      touch-action: none;
      max-width: 100%;
      height: auto;
    }
    #hud {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    #hud span {
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: rgba(31, 36, 67, 0.8);
      border: 1px solid rgba(119, 158, 255, 0.4);
      text-transform: uppercase;
      font-size: 0.95rem;
    }
    #message {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(4, 6, 12, 0.86);
      border-radius: 12px;
      text-align: center;
      padding: 1.5rem;
      gap: 1rem;
      transition: opacity 0.25s ease;
      opacity: 0;
      pointer-events: none;
    }
    #message.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #message h2 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.05em;
    }
    #message button {
      padding: 0.6rem 1.6rem;
      font-size: 1rem;
      font-weight: 600;
      color: #07122b;
      background: linear-gradient(135deg, #86b6ff, #58f8c7);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(8, 128, 191, 0.35);
    }
    #touchControls {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: grid;
      grid-template-columns: repeat(3, 64px);
      grid-template-rows: repeat(3, 64px);
      gap: 10px;
      pointer-events: none;
    }
    .touch-btn {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: rgba(22, 26, 54, 0.72);
      border: 1px solid rgba(119, 158, 255, 0.45);
      color: rgba(207, 227, 255, 0.95);
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      touch-action: none;
      user-select: none;
    }
    .touch-btn:active {
      transform: scale(0.96);
      background: rgba(119, 158, 255, 0.45);
      color: #04102c;
    }
    #touchControls button:nth-child(1),
    #touchControls button:nth-child(3),
    #touchControls button:nth-child(7),
    #touchControls button:nth-child(9) {
      visibility: hidden;
      pointer-events: none;
    }
    @media (pointer: fine) {
      #touchControls {
        display: none;
      }
    }
    @media (max-width: 768px) {
      body {
        padding: 1.25rem 0.75rem 2.5rem;
        gap: 1.1rem;
      }
      header {
        max-width: 100%;
      }
      header h1 {
        font-size: clamp(1.4rem, 5vw, 2rem);
      }
      header p {
        font-size: 0.95rem;
      }
      #gameWrapper {
        gap: 0.6rem;
      }
      #hud {
        gap: 0.9rem;
      }
      #hud span {
        font-size: 0.85rem;
        padding: 0.3rem 0.6rem;
      }
      #message h2 {
        font-size: 1.6rem;
      }
      #message button {
        padding: 0.5rem 1.3rem;
        font-size: 0.95rem;
      }
      #touchControls {
        bottom: 18px;
        right: 18px;
        grid-template-columns: repeat(3, 56px);
        grid-template-rows: repeat(3, 56px);
        gap: 8px;
      }
      .touch-btn {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        font-size: 1.3rem;
      }
    }
    @media (max-width: 540px) {
      #hud {
        flex-direction: column;
      }
      #touchControls {
        bottom: 16px;
        right: 16px;
        grid-template-columns: repeat(3, 48px);
        grid-template-rows: repeat(3, 48px);
        gap: 6px;
      }
      .touch-btn {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        font-size: 1.15rem;
      }
    }
    @media (max-width: 400px) {
      body {
        padding: 1rem 0.5rem 2rem;
      }
      header h1 {
        font-size: clamp(1.2rem, 6vw, 1.5rem);
      }
      header p {
        font-size: 0.85rem;
      }
      #touchControls {
        bottom: 14px;
        right: 14px;
        grid-template-columns: repeat(3, 44px);
        grid-template-rows: repeat(3, 44px);
      }
      .touch-btn {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        font-size: 1rem;
      }
      #message button {
        font-size: 0.9rem;
      }
    }
  </style>

  <link rel='stylesheet' href='cookie-consent.css'>
  <script defer src='cookie-consent.js'></script>
</head>
<body>
  <a class="back-link" href="pelit.html">&larr; Takaisin pelisivulle</a>
  <header>
    <h1>Johdata asiakas Yhdisys R.Y.:n tapahtumaan</h1>
    <p>Selvitä labyrintti nuolinäppäimillä tai kosketuspainikkeilla ja saavu tapahtumapisteelle ennen kuin aika loppuu.</p>
    <p>Vinkki: seinään törmätessä liike pysähtyy. Etsi reitti, jossa ei ole esteitä.</p>
  </header>

  <main id="gameWrapper">
    <canvas id="maze" width="560" height="560"></canvas>
    <div id="message">
      <h2></h2>
      <p id="messageText"></p>
      <button id="restartBtn" type="button">Pelaa uudelleen</button>
    </div>
    <div id="hud">
      <span id="time">Aika: 120 s</span>
      <span id="status">Matka alkaa!</span>
    </div>
  </main>

  <div id="touchControls" aria-hidden="true">
    <button class="touch-btn" data-dir=""></button>
    <button class="touch-btn" data-dir="up">▲</button>
    <button class="touch-btn" data-dir=""></button>
    <button class="touch-btn" data-dir="left">◄</button>
    <button class="touch-btn" data-dir=""></button>
    <button class="touch-btn" data-dir="right">►</button>
    <button class="touch-btn" data-dir=""></button>
    <button class="touch-btn" data-dir="down">▼</button>
    <button class="touch-btn" data-dir=""></button>
  </div>

  <script>
    const canvas = document.getElementById("maze");
    const ctx = canvas.getContext("2d");
    const timerEl = document.getElementById("time");
    const statusEl = document.getElementById("status");
    const messageEl = document.getElementById("message");
    const messageTitle = messageEl.querySelector("h2");
    const messageText = document.getElementById("messageText");
    const restartBtn = document.getElementById("restartBtn");

    const BASE_TILE_SIZE = 16;

    function calculateTileSize() {
      const width = window.innerWidth;
      if (width <= 360) {
        return 10;
      }
      if (width <= 520) {
        return 12;
      }
      if (width <= 768) {
        return 14;
      }
      return BASE_TILE_SIZE;
    }

    let tileSize = calculateTileSize();
    const levelLayout = [
      "##############################",
      "#S........####...##.#...###.##",
      "#######.#......#.##.#.#.#...##",
      "#....##.####.###.##.#.#...#.##",
      "#.##.##......#....#.#..####.##",
      "#.##.##.####.#.##.#.##.#....##",
      "#.##.##.###....##.#.##.#.##.##",
      "#.##.##.#########.#.##.#.#..##",
      "#.##.##.##.....####.#..#.##.##",
      "#.##.##.##.###.##...#.##.#..##",
      "#.##.##.##.###....##..##.##.##",
      "#.##.##.##.#########.#...##.##",
      "#.##..........#......###.#..##",
      "#.###########.#.#####..#.##.##",
      "#.##...###.##.#.#.#...#..##.##",
      "#....#.....##.#.#.##.##.###.##",
      "######.#.######.#.##.#...#..##",
      "#...##.#.#......#.##.#.#...###",
      "#.#.##.#.#.####.#.##.#.###..##",
      "#.#.##.#.#....#...##.#.#.##.##",
      "#.#.##.#.####.######.#.#.##.##",
      "#.#....#....#.######.#.#.##.##",
      "#.########.##.###..#.#.#....##",
      "#.###....#.##..##.##.#.####.##",
      "#.....##.#.###.##.##....E.#.##",
      "########.#####.##.###.##.#..##",
      "###...............##.......###",
      "##############################"
    ];

    const rows = levelLayout.length;
    const cols = levelLayout[0].length;

    function setCanvasDimensions() {
      canvas.width = cols * tileSize;
      canvas.height = rows * tileSize;
    }

    setCanvasDimensions();

    let player = { row: 0, col: 0 };
    let goal = { row: 0, col: 0 };
    let remainingTime = 120;
    let countdownId = null;
    let touchInterval = null;
    let resizeTimeoutId = null;
    let gameActive = false;

    function findLocations() {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (levelLayout[r][c] === "S") {
            player = { row: r, col: c };
          }
          if (levelLayout[r][c] === "E") {
            goal = { row: r, col: c };
          }
        }
      }
    }

    function drawMaze() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const scale = tileSize / BASE_TILE_SIZE;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const tile = levelLayout[r][c];
          const x = c * tileSize;
          const y = r * tileSize;

          if (tile === "#") {
            ctx.fillStyle = "#171c35";
            ctx.fillRect(x, y, tileSize, tileSize);
            ctx.strokeStyle = "rgba(86, 105, 173, 0.35)";
            ctx.strokeRect(x + 0.5, y + 0.5, tileSize - 1, tileSize - 1);
          } else {
            ctx.fillStyle = "rgba(18, 24, 46, 0.92)";
            ctx.fillRect(x, y, tileSize, tileSize);
            ctx.fillStyle = "rgba(90, 125, 220, 0.12)";
            const inset = 6 * scale;
            const innerSize = Math.max(tileSize - inset * 2, 0);
            ctx.fillRect(x + inset, y + inset, innerSize, innerSize);
          }

          if (tile === "S") {
            drawHome(x, y);
          }
          if (tile === "E") {
            drawEvent(x, y);
          }
        }
      }
      drawPlayer();
    }

    function drawHome(x, y) {
      ctx.save();
      ctx.translate(x + tileSize / 2, y + tileSize / 2);
      const scale = tileSize / BASE_TILE_SIZE;
      ctx.fillStyle = "#f0d37a";
      ctx.beginPath();
      ctx.moveTo(-12 * scale, 8 * scale);
      ctx.lineTo(0, -12 * scale);
      ctx.lineTo(12 * scale, 8 * scale);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#0f172e";
      ctx.fillRect(-8 * scale, 8 * scale, 16 * scale, 10 * scale);
      ctx.restore();
    }

    function drawEvent(x, y) {
      ctx.save();
      ctx.translate(x + tileSize / 2, y + tileSize / 2);
      const scale = tileSize / BASE_TILE_SIZE;
      ctx.fillStyle = "#71f4c5";
      ctx.beginPath();
      ctx.arc(0, 0, 14 * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#0c1d32";
      ctx.beginPath();
      ctx.arc(0, 0, 6 * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#0c1d32";
      ctx.lineWidth = 4 * scale;
      ctx.beginPath();
      ctx.moveTo(-14 * scale, 0);
      ctx.lineTo(14 * scale, 0);
      ctx.stroke();
      ctx.restore();
    }

    function drawPlayer() {
      const x = player.col * tileSize + tileSize / 2;
      const y = player.row * tileSize + tileSize / 2;
      ctx.save();
      ctx.translate(x, y);
      const scale = tileSize / BASE_TILE_SIZE;
      ctx.fillStyle = "#ffb870";
      ctx.beginPath();
      ctx.arc(0, 0, 12 * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#133a72";
      ctx.fillRect(-7 * scale, -2 * scale, 14 * scale, 14 * scale);
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(-3 * scale, -1 * scale, 2 * scale, 0, Math.PI * 2);
      ctx.arc(3 * scale, -1 * scale, 2 * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    const directions = {
      ArrowUp: { row: -1, col: 0 },
      ArrowDown: { row: 1, col: 0 },
      ArrowLeft: { row: 0, col: -1 },
      ArrowRight: { row: 0, col: 1 },
      up: { row: -1, col: 0 },
      down: { row: 1, col: 0 },
      left: { row: 0, col: -1 },
      right: { row: 0, col: 1 }
    };

    function attemptMove(delta) {
      if (!gameActive) {
        return;
      }
      const nextRow = player.row + delta.row;
      const nextCol = player.col + delta.col;
      if (nextRow < 0 || nextRow >= rows || nextCol < 0 || nextCol >= cols) {
        return;
      }
      if (levelLayout[nextRow][nextCol] === "#") {
        statusEl.textContent = "Este tiellä – etsi uusi reitti!";
        return;
      }
      player = { row: nextRow, col: nextCol };
      statusEl.textContent = "Hyvä! Jatka matkaa.";
      drawMaze();
      checkGoal();
    }

    function checkGoal() {
      if (player.row === goal.row && player.col === goal.col) {
        endGame(true);
      }
    }

    function updateTimerDisplay() {
      timerEl.textContent = `Aika: ${remainingTime} s`;
    }

    function startCountdown() {
      clearInterval(countdownId);
      countdownId = setInterval(() => {
        remainingTime -= 1;
        if (remainingTime <= 0) {
          remainingTime = 0;
          updateTimerDisplay();
          endGame(false);
          return;
        }
        updateTimerDisplay();
      }, 1000);
    }

    function endGame(won) {
      gameActive = false;
      clearInterval(countdownId);
      clearInterval(touchInterval);
      touchInterval = null;
      if (won) {
        statusEl.textContent = "Onnittelut! Ehdittiin tapahtumaan.";
        messageTitle.textContent = "Voitto!";
        messageText.textContent = "Asiakas pääsi Yhdisys R.Y.:n tapahtumaan ajoissa.";
      } else {
        statusEl.textContent = "Aika loppui... yritä uudelleen.";
        messageTitle.textContent = "Hups!";
        messageText.textContent = "Asiakas ei ehtinyt perille. Kokeile löytää lyhyempi reitti.";
      }
      messageEl.classList.add("visible");
    }

    function resetGame() {
      setCanvasDimensions();
      findLocations();
      remainingTime = 120;
      updateTimerDisplay();
      statusEl.textContent = "Matka alkaa!";
      messageEl.classList.remove("visible");
      gameActive = true;
      drawMaze();
      startCountdown();
    }

    document.addEventListener("keydown", (event) => {
      const delta = directions[event.key];
      if (event.key === " " && !gameActive) {
        resetGame();
        return;
      }
      if (!delta) {
        return;
      }
      event.preventDefault();
      attemptMove(delta);
    });

    restartBtn.addEventListener("click", () => {
      resetGame();
    });

    function handleTouchStart(event) {
      const dir = event.currentTarget.dataset.dir;
      if (!dir) {
        return;
      }
      event.preventDefault();
      const delta = directions[dir];
      attemptMove(delta);
      clearInterval(touchInterval);
      touchInterval = setInterval(() => attemptMove(delta), 220);
    }

    function handleTouchEnd(event) {
      event.preventDefault();
      clearInterval(touchInterval);
      touchInterval = null;
    }

    document.querySelectorAll(".touch-btn").forEach((btn) => {
      btn.addEventListener("pointerdown", handleTouchStart);
      btn.addEventListener("pointerup", handleTouchEnd);
      btn.addEventListener("pointerleave", handleTouchEnd);
      btn.addEventListener("pointercancel", handleTouchEnd);
    });

    function handleResize() {
      resizeTimeoutId = null;
      const newSize = calculateTileSize();
      if (newSize === tileSize) {
        return;
      }
      tileSize = newSize;
      setCanvasDimensions();
      drawMaze();
    }

    window.addEventListener("resize", () => {
      if (resizeTimeoutId) {
        clearTimeout(resizeTimeoutId);
      }
      resizeTimeoutId = setTimeout(handleResize, 120);
    });

    resetGame();
  </script>
</body>
</html>
