  <main id="gameWrapper">

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const container = document.getElementById("threeContainer");
    const playerScoreEl = document.getElementById("playerScore");
    const ownGoalsEl = document.getElementById("ownGoals");
    const announcementEl = document.getElementById("announcement");
    const lampIndicatorEl = document.getElementById("lampIndicator");

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x01060c, 36, 80);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio || 1);
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const desktopCameraTarget = new THREE.Vector3(0, 0, 2);
    const mobileCameraTarget = new THREE.Vector3(0, 0, 0.6);
    const camera = new THREE.PerspectiveCamera(
      42,
      container.clientWidth / container.clientHeight,
      0.1,
      120
    );

    function isMobileViewport() {
      return (
        window.innerWidth <= 768 ||
        window.innerHeight <= 600 ||
        container.clientWidth <= 700
      );
    }

    function configureCameraForViewport() {
      const mobileViewport = isMobileViewport();
      if (mobileViewport) {
        camera.fov = 56;
        camera.position.set(0, 28, 10.5);
        camera.lookAt(mobileCameraTarget);
      } else {
        camera.fov = 42;
        camera.position.set(0, 16.5, 18.5);
        camera.lookAt(desktopCameraTarget);
      }
      camera.updateProjectionMatrix();
    }
    configureCameraForViewport();

    const ambient = new THREE.HemisphereLight(0xcde8ff, 0x0e172a, 0.85);
    scene.add(ambient);
    const mainLight = new THREE.DirectionalLight(0xffffff, 0.9);
    mainLight.position.set(7, 13, 9);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.set(1024, 1024);
    mainLight.shadow.camera.near = 4;
    mainLight.shadow.camera.far = 40;
    mainLight.shadow.camera.left = -18;
    mainLight.shadow.camera.right = 18;
    mainLight.shadow.camera.top = 18;
    mainLight.shadow.camera.bottom = -18;
    scene.add(mainLight);

    const rinkWidth = 12;
    const rinkDepth = 22;
    const rinkCornerRadius = 1.8;
    const rinkHalfWidth = rinkWidth / 2;
    const rinkHalfDepth = rinkDepth / 2;
    const wallThickness = 0.4;
    const goalWidth = 4;
    const goalDepth = 1.4;
    const goalPostRadius = 0.12;
    const goalFrontClearance = -0.01;
    const malletRadius = 0.6;
    const malletHeight = 0.4;
    const puckRadius = 0.45;
    const puckHeight = 0.30;
    const puckRestY = puckHeight / 2;
    const malletRestY = malletHeight / 2 + 0.02;
    const dropHeight = 4.2;
    const playerMinZ = -rinkHalfDepth + malletRadius;
    const playerMaxZ = rinkHalfDepth - malletRadius;
    const playerGoalieMinZ = rinkHalfDepth - 4.2;
    const playerGoalieMaxZ = rinkHalfDepth - 1.4;
    const playerGoalieHomeZ = (playerGoalieMinZ + playerGoalieMaxZ) / 2;
    const goalieMinZ = -rinkHalfDepth + 1.4;
    const goalieMaxZ = -rinkHalfDepth + 4.2;
    const chaserBackBuffer = 3.8; // keep red chaser away from its own goal line
    const chaserFrontBuffer = 1.6;
    const chaserSideBuffer = malletRadius * 2.2;
    const chaserMinZ = -rinkHalfDepth + chaserBackBuffer;
    const chaserMaxZ = rinkHalfDepth - chaserFrontBuffer;

    function createRoundedRectShape(width, height, radius, centerX = 0, centerY = 0) {
      const shape = new THREE.Shape();
      const hw = width / 2;
      const hh = height / 2;
      const r = Math.min(radius, hw, hh);
      shape.moveTo(centerX - hw + r, centerY - hh);
      shape.lineTo(centerX + hw - r, centerY - hh);
      shape.quadraticCurveTo(centerX + hw, centerY - hh, centerX + hw, centerY - hh + r);
      shape.lineTo(centerX + hw, centerY + hh - r);
      shape.quadraticCurveTo(centerX + hw, centerY + hh, centerX + hw - r, centerY + hh);
      shape.lineTo(centerX - hw + r, centerY + hh);
      shape.quadraticCurveTo(centerX - hw, centerY + hh, centerX - hw, centerY + hh - r);
      shape.lineTo(centerX - hw, centerY - hh + r);
      shape.quadraticCurveTo(centerX - hw, centerY - hh, centerX - hw + r, centerY - hh);
      shape.closePath();
      return shape;
    }

    function createWallShapeWithGoalGaps(width, depth, thickness, cornerRadius, goalWidth) {
      const outerWidth = width + thickness * 2;
      const outerDepth = depth + thickness * 2;
      const hw = outerWidth / 2;
      const hh = outerDepth / 2;
      const r = Math.min(cornerRadius + thickness, hw, hh);
      const shape = new THREE.Shape();
      shape.moveTo(-hw + r, -hh);
      shape.lineTo(hw - r, -hh);
      shape.quadraticCurveTo(hw, -hh, hw, -hh + r);
      shape.lineTo(hw, hh - r);
      shape.quadraticCurveTo(hw, hh, hw - r, hh);
      shape.lineTo(-hw + r, hh);
      shape.quadraticCurveTo(-hw, hh, -hw, hh - r);
      shape.lineTo(-hw, -hh + r);
      shape.quadraticCurveTo(-hw, -hh, -hw + r, -hh);
      shape.closePath();

      const inner = createRoundedRectShape(width, depth, cornerRadius);
      shape.holes.push(inner);

      const maxGapHalf = Math.max(0.5, hw - r - 0.05);
      const gapHalfWidth = Math.min(goalWidth / 2 + 0.45, maxGapHalf);
      const gapStart = depth / 2 - 0.05;

      const topGap = new THREE.Path();
      topGap.moveTo(-gapHalfWidth, hh);
      topGap.lineTo(gapHalfWidth, hh);
      topGap.lineTo(gapHalfWidth, gapStart);
      topGap.lineTo(-gapHalfWidth, gapStart);
      topGap.closePath();
      shape.holes.push(topGap);

      const bottomGap = new THREE.Path();
      bottomGap.moveTo(-gapHalfWidth, -gapStart);
      bottomGap.lineTo(gapHalfWidth, -gapStart);
      bottomGap.lineTo(gapHalfWidth, -hh);
      bottomGap.lineTo(-gapHalfWidth, -hh);
      bottomGap.closePath();
      shape.holes.push(bottomGap);

      return shape;
    }

    function createGoalNetTexture() {
      const size = 256;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "rgba(0,0,0,0)";
      ctx.fillRect(0, 0, size, size);
      ctx.strokeStyle = "rgba(255, 255, 255, 0.55)";
      ctx.lineWidth = 4;
      const spacing = size / 8;
      for (let i = spacing / 2; i < size; i += spacing) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, size);
        ctx.stroke();
      }
      for (let j = spacing / 2; j < size; j += spacing) {
        ctx.beginPath();
        ctx.moveTo(0, j);
        ctx.lineTo(size, j);
        ctx.stroke();
      }
      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(2, 2);
      return texture;
    }

    function createTcgSpotlightTexture() {
      const size = 900;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      const center = size / 2;

      ctx.clearRect(0, 0, size, size);

      const halo = ctx.createRadialGradient(center, center, size * 0.12, center, center, size * 0.46);
      halo.addColorStop(0, "rgba(255, 255, 255, 0.3)");
      halo.addColorStop(0.6, "rgba(255, 255, 255, 0.08)");
      halo.addColorStop(1, "rgba(255, 255, 255, 0)");
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(center, center, size * 0.46, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      const emberGlow = ctx.createRadialGradient(center - size * 0.1, center - size * 0.08, size * 0.06, center, center, size * 0.52);
      emberGlow.addColorStop(0, "rgba(255, 255, 255, 0.45)");
      emberGlow.addColorStop(0.4, "rgba(255, 230, 200, 0.2)");
      emberGlow.addColorStop(1, "rgba(255, 255, 255, 0)");
      ctx.fillStyle = emberGlow;
      ctx.beginPath();
      ctx.arc(center, center, size * 0.55, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      const ribbonGradient = ctx.createLinearGradient(center - size * 0.36, center + size * 0.3, center + size * 0.36, center - size * 0.3);
      ribbonGradient.addColorStop(0, "rgba(255, 255, 255, 0)");
      ribbonGradient.addColorStop(0.2, "rgba(255, 136, 0, 0.35)");
      ribbonGradient.addColorStop(0.55, "rgba(255, 40, 40, 0.35)");
      ribbonGradient.addColorStop(0.85, "rgba(255, 214, 0, 0.4)");
      ribbonGradient.addColorStop(1, "rgba(255, 255, 255, 0)");
      ctx.save();
      ctx.translate(center, center);
      ctx.rotate(-Math.PI / 9);
      ctx.fillStyle = ribbonGradient;
      ctx.fillRect(-size * 0.42, -size * 0.16, size * 0.84, size * 0.32);
      ctx.restore();

      ctx.lineWidth = size * 0.032;
      const rimGradient = ctx.createLinearGradient(center - size * 0.4, center - size * 0.4, center + size * 0.4, center + size * 0.4);
      rimGradient.addColorStop(0, "#ff4800");
      rimGradient.addColorStop(0.4, "#ff002f");
      rimGradient.addColorStop(0.7, "#ff7b00");
      rimGradient.addColorStop(1, "#ffd54b");
      ctx.strokeStyle = rimGradient;
      ctx.shadowColor = "rgba(255, 70, 25, 0.65)";
      ctx.shadowBlur = 38;
      ctx.beginPath();
      ctx.arc(center, center, size * 0.39, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;

      ctx.save();
      ctx.translate(center, center);
      ctx.rotate(Math.PI / 7);
      const stripeGradient = ctx.createLinearGradient(-size * 0.55, 0, size * 0.55, 0);
      stripeGradient.addColorStop(0, "rgba(0, 0, 0, 0)");
      stripeGradient.addColorStop(0.25, "rgba(255, 116, 0, 0.55)");
      stripeGradient.addColorStop(0.5, "rgba(255, 16, 16, 0.4)");
      stripeGradient.addColorStop(0.75, "rgba(255, 214, 0, 0.35)");
      stripeGradient.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = stripeGradient;
      ctx.globalAlpha = 0.72;
      ctx.fillRect(-size * 0.6, -size * 0.08, size * 1.2, size * 0.16);
      ctx.globalAlpha = 1;
      ctx.restore();

      const sliceGradient = ctx.createLinearGradient(center - size * 0.38, center - size * 0.38, center + size * 0.38, center + size * 0.38);
      sliceGradient.addColorStop(0, "rgba(255, 140, 0, 0.14)");
      sliceGradient.addColorStop(0.4, "rgba(255, 82, 42, 0.12)");
      sliceGradient.addColorStop(1, "rgba(255, 222, 103, 0.25)");
      ctx.lineWidth = size * 0.013;
      ctx.strokeStyle = "rgba(255, 245, 230, 0.75)";
      ctx.fillStyle = sliceGradient;
      ctx.beginPath();
      ctx.moveTo(center - size * 0.05, center - size * 0.36);
      ctx.lineTo(center + size * 0.32, center);
      ctx.lineTo(center + size * 0.05, center + size * 0.36);
      ctx.lineTo(center - size * 0.32, center);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.save();
      ctx.translate(center, center);
      ctx.rotate(-Math.PI / 4.5);
      ctx.strokeStyle = "rgba(0, 0, 0, 0.45)";
      ctx.lineWidth = size * 0.026;
      ctx.beginPath();
      ctx.moveTo(-size * 0.11, -size * 0.2);
      ctx.lineTo(size * 0.11, size * 0.2);
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.translate(center, center);
      ctx.scale(1.1, 0.62);
      ctx.rotate(Math.PI / 2);
      ctx.strokeStyle = "rgba(255, 176, 122, 0.25)";
      ctx.lineWidth = size * 0.022;
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.46, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      const crestGradient = ctx.createLinearGradient(center, center - size * 0.18, center, center + size * 0.18);
      crestGradient.addColorStop(0, "#061a3a");
      crestGradient.addColorStop(0.5, "#03102c");
      crestGradient.addColorStop(1, "#01060f");
      ctx.fillStyle = crestGradient;
      ctx.strokeStyle = "rgba(170, 210, 255, 0.45)";
      ctx.lineWidth = size * 0.012;
      ctx.beginPath();
      ctx.moveTo(center, center - size * 0.24);
      ctx.quadraticCurveTo(center + size * 0.26, center - size * 0.05, center + size * 0.18, center + size * 0.2);
      ctx.quadraticCurveTo(center, center + size * 0.28, center - size * 0.18, center + size * 0.2);
      ctx.quadraticCurveTo(center - size * 0.26, center - size * 0.05, center, center - size * 0.24);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.save();
      ctx.clip();
      const crestLight = ctx.createLinearGradient(center - size * 0.25, center - size * 0.12, center + size * 0.25, center + size * 0.15);
      crestLight.addColorStop(0, "rgba(69, 184, 255, 0.4)");
      crestLight.addColorStop(0.5, "rgba(178, 214, 255, 0.25)");
      crestLight.addColorStop(1, "rgba(255, 255, 255, 0.25)");
      ctx.fillStyle = crestLight;
      ctx.fillRect(center - size * 0.35, center - size * 0.35, size * 0.7, size * 0.7);
      ctx.restore();

      const crestLines = ctx.createLinearGradient(center - size * 0.18, center, center + size * 0.18, center);
      crestLines.addColorStop(0, "rgba(255, 255, 255, 0)");
      crestLines.addColorStop(0.5, "rgba(255, 230, 210, 0.6)");
      crestLines.addColorStop(1, "rgba(255, 255, 255, 0)");
      ctx.strokeStyle = crestLines;
      ctx.lineWidth = size * 0.007;
      ctx.beginPath();
      ctx.moveTo(center - size * 0.2, center - size * 0.01);
      ctx.lineTo(center + size * 0.2, center - size * 0.01);
      ctx.stroke();

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0, 0, 0, 0.65)";
      ctx.shadowBlur = 24;
      const titleGradient = ctx.createLinearGradient(center - size * 0.28, center - size * 0.12, center + size * 0.28, center + size * 0.12);
      titleGradient.addColorStop(0, "#00e5ff");
      titleGradient.addColorStop(0.3, "#5c7cff");
      titleGradient.addColorStop(0.6, "#ff3b8d");
      titleGradient.addColorStop(1, "#ffd84f");
      ctx.fillStyle = titleGradient;
      ctx.strokeStyle = "rgba(3, 6, 38, 0.85)";
      ctx.lineWidth = size * 0.01;
      ctx.font = "900 150px 'Segoe UI'";
      ctx.strokeText("TARMOLA", center, center - size * 0.04);
      ctx.fillText("TARMOLA", center, center - size * 0.04);

      ctx.shadowBlur = 14;
      const subtitleGradient = ctx.createLinearGradient(center - size * 0.25, center + size * 0.02, center + size * 0.25, center + size * 0.14);
      subtitleGradient.addColorStop(0, "#ffe976");
      subtitleGradient.addColorStop(0.4, "#ff6f91");
      subtitleGradient.addColorStop(0.8, "#7af0ff");
      subtitleGradient.addColorStop(1, "#8fffd1");
      ctx.fillStyle = subtitleGradient;
      ctx.font = "800 72px 'Segoe UI'";
      ctx.fillText("CODE GARAGE", center, center + size * 0.09);

      ctx.shadowBlur = 0;
      const taglineGradient = ctx.createLinearGradient(center - size * 0.2, center + size * 0.12, center + size * 0.2, center + size * 0.21);
      taglineGradient.addColorStop(0, "#91f3ff");
      taglineGradient.addColorStop(0.5, "#f7c5ff");
      taglineGradient.addColorStop(1, "#ffe1a8");
      ctx.fillStyle = taglineGradient;
      ctx.font = "600 46px 'Segoe UI'";
      ctx.fillText("INFERNO AIR HOCKEY LAB", center, center + size * 0.18);

      ctx.strokeStyle = "rgba(255, 212, 192, 0.75)";
      ctx.lineWidth = size * 0.011;
      ctx.beginPath();
      ctx.moveTo(center - size * 0.28, center + size * 0.13);
      ctx.lineTo(center + size * 0.28, center + size * 0.13);
      ctx.stroke();

      ctx.fillStyle = "rgba(255, 120, 0, 0.8)";
      ctx.beginPath();
      ctx.arc(center - size * 0.3, center - size * 0.18, size * 0.024, 0, Math.PI * 2);
      ctx.arc(center + size * 0.26, center + size * 0.2, size * 0.02, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255, 40, 40, 0.85)";
      ctx.beginPath();
      ctx.arc(center + size * 0.28, center - size * 0.17, size * 0.025, 0, Math.PI * 2);
      ctx.arc(center - size * 0.25, center + size * 0.22, size * 0.02, 0, Math.PI * 2);
      ctx.fill();

      const microLines = ctx.createLinearGradient(center - size * 0.26, center, center + size * 0.26, center);
      microLines.addColorStop(0, "rgba(255, 255, 255, 0)");
      microLines.addColorStop(0.2, "rgba(255, 230, 220, 0.6)");
      microLines.addColorStop(0.8, "rgba(255, 230, 220, 0.45)");
      microLines.addColorStop(1, "rgba(255, 255, 255, 0)");
      ctx.strokeStyle = microLines;
      ctx.lineWidth = size * 0.006;
      ctx.beginPath();
      ctx.moveTo(center - size * 0.2, center - size * 0.015);
      ctx.lineTo(center + size * 0.2, center - size * 0.015);
      ctx.stroke();

      const lowGlow = ctx.createRadialGradient(center, center, size * 0.2, center, center, size * 0.52);
      lowGlow.addColorStop(0, "rgba(255, 255, 255, 0)");
      lowGlow.addColorStop(1, "rgba(30, 0, 0, 0.85)");
      ctx.fillStyle = lowGlow;
      ctx.beginPath();
      ctx.arc(center, center, size * 0.52, 0, Math.PI * 2);
      ctx.fill();

      texture.anisotropy = renderer.capabilities.getMaxAnisotropy?.() ?? 8;
      texture.wrapS = THREE.ClampToEdgeWrapping;
      texture.wrapT = THREE.ClampToEdgeWrapping;

    function updatePointerPosition(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);

      if (!intersects.length) {
        return;

      const point = intersects[0].point;

      const clampZ = Math.max(playerMinZ, Math.min(playerMaxZ, point.z));
      playerTarget.set(clampX, malletRestY, clampZ);
    }

      if (event.pointerType === "mouse" || (pointerActive && event.pointerId === activePointerId)) {

    function createGoalGlowTexture(flip = false) {
      const size = 512;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      const gradient = ctx.createLinearGradient(0, flip ? size : 0, 0, flip ? 0 : size);
      gradient.addColorStop(0, "rgba(255, 60, 38, 0.95)");
      gradient.addColorStop(0.3, "rgba(255, 60, 38, 0.72)");
      gradient.addColorStop(0.65, "rgba(255, 60, 38, 0.28)");
      gradient.addColorStop(1, "rgba(255, 60, 38, 0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      ctx.globalCompositeOperation = "destination-in";
      const edgeGradient = ctx.createLinearGradient(0, 0, size, 0);
      edgeGradient.addColorStop(0, "rgba(255, 255, 255, 0)");
      edgeGradient.addColorStop(0.14, "rgba(255, 255, 255, 1)");
      edgeGradient.addColorStop(0.86, "rgba(255, 255, 255, 1)");
      edgeGradient.addColorStop(1, "rgba(255, 255, 255, 0)");
      ctx.fillStyle = edgeGradient;
      ctx.fillRect(0, 0, size, size);

      const softSpot = ctx.createRadialGradient(
        size / 2,
        flip ? size * 0.18 : size * 0.82,
        size * 0.18,
        size / 2,
        flip ? size * 0.18 : size * 0.82,
        size * 0.55
      );
      softSpot.addColorStop(0, "rgba(255, 255, 255, 0.95)");
      softSpot.addColorStop(0.55, "rgba(255, 255, 255, 0.28)");
      softSpot.addColorStop(1, "rgba(255, 255, 255, 0)");
      ctx.fillStyle = softSpot;
      ctx.fillRect(0, 0, size, size);

      ctx.globalCompositeOperation = "source-over";

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.ClampToEdgeWrapping;
      texture.wrapT = THREE.ClampToEdgeWrapping;
      texture.anisotropy = renderer.capabilities.getMaxAnisotropy?.() ?? 8;
      return texture;
    }

    function createPuckTopTexture() {
      const size = 256;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      const outerGradient = ctx.createRadialGradient(size / 2, size / 2, size * 0.12, size / 2, size / 2, size * 0.5);
      outerGradient.addColorStop(0, "#2a2a30");
      outerGradient.addColorStop(0.55, "#111116");
      outerGradient.addColorStop(1, "#020203");
      ctx.fillStyle = outerGradient;
      ctx.fillRect(0, 0, size, size);

      ctx.strokeStyle = "rgba(255, 255, 255, 0.38)";
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size * 0.42, 0, Math.PI * 2);
      ctx.stroke();

      const sheenGradient = ctx.createRadialGradient(
        size * 0.36,
        size * 0.34,
        size * 0.02,
        size * 0.36,
        size * 0.34,
        size * 0.26
      );
      sheenGradient.addColorStop(0, "rgba(255, 255, 255, 0.42)");
      sheenGradient.addColorStop(1, "rgba(255, 255, 255, 0.02)");
      ctx.fillStyle = sheenGradient;
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size * 0.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 90px 'Segoe UI'";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0, 0, 0, 0.55)";
      ctx.shadowBlur = 6;
      ctx.fillText("TCG", size / 2, size / 2);

      return new THREE.CanvasTexture(canvas);
    }

    function createMalletLabelTexture(text) {
      const size = 256;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      ctx.clearRect(0, 0, size, size);
      const center = size / 2;
      const radius = size * 0.42;

      const backgroundGradient = ctx.createRadialGradient(center, center, radius * 0.2, center, center, radius);
      backgroundGradient.addColorStop(0, "rgba(255, 255, 255, 0.95)");
      backgroundGradient.addColorStop(1, "rgba(240, 247, 255, 0.8)");
      ctx.fillStyle = backgroundGradient;
      ctx.beginPath();
      ctx.arc(center, center, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(0, 0, 0, 0.25)";
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.arc(center, center, radius * 0.92, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "#050505";
      ctx.font = "bold 96px 'Segoe UI'";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, center, center);

      const texture = new THREE.CanvasTexture(canvas);
      texture.anisotropy = renderer.capabilities.getMaxAnisotropy?.() ?? 8;
      return texture;
    }

      goalGlowMaterialBottom.opacity = zone === "bottom" ? 1 : 0.2;

      const message =
        winner === "player"
          ? "Kymppi täynnä! Tarmola vie erän."
          : "Vieraat latoivat taulun täyteen ja vievät erän.";
      announcementEl.textContent = `${message} Uusi erä alkaa pian.`;
      resetPuck();
      clearTimeout(matchResetTimeout);
      matchResetTimeout = setTimeout(() => {
        restartMatch();
      }, 4200);
    }

    function registerGoal(type) {
      if (!matchActive) {
        return;
      }
      clearTimeout(matchResetTimeout);
      matchResetTimeout = null;

      if (type === "player") {
        playerScore += 1;
        announcementEl.textContent = "Verkko heiluu! Garage tiimi tekee maalin.";
        flashLamp(0xff6a3f, "top");
      } else {
        ownGoals += 1;
        announcementEl.textContent = "Hups! Kiekko lirui omaan maaliin.";
        flashLamp(0xff6a3f, "bottom");
      }
      updateScoreDisplay();

      const winner = playerScore >= winningScore ? "player" : ownGoals >= winningScore ? "opponent" : null;
      if (winner) {
        endMatch(winner);
        return;
      }

      resetPuck(type === "own");
    }

    function pickGoalieTarget(force = false) {
      const puckOnDefensiveSide = puck.position.z < -rinkHalfDepth * 0.1;
      if (!force && puckOnDefensiveSide && Math.random() < 0.55) {
        goalieTarget.set(
          clamp(puck.position.x, -goalWidth / 2 + malletRadius, goalWidth / 2 - malletRadius),
          malletRestY,
          clamp(puck.position.z + 1.2, goalieMinZ + 0.1, goalieMaxZ)
        );
      } else {
        const randomX =
          (Math.random() - 0.5) * (goalWidth - malletRadius * 1.4);
        const randomZ = goalieMinZ + 0.6 + Math.random() * (goalieMaxZ - goalieMinZ - 0.6);
        goalieTarget.set(randomX, malletRestY, randomZ);
      }
      goalieChangeTimer = 0.8 + Math.random() * 1.2;
    }

    pickGoalieTarget(true);
    resetPuck();
    playerMallet.position.set(0, malletRestY, rinkHalfDepth * 0.3);
    playerGoalieMallet.position.set(0, malletRestY, playerGoalieHomeZ);
    playerGoalieTarget.copy(playerGoalieMallet.position);
    goalieMallet.position.copy(goalieTarget);
    chaserMallet.position.copy(chaserTarget);
    clampMalletToBounds(playerMallet);
    clampMalletToBounds(playerGoalieMallet);
    clampMalletToBounds(goalieMallet);
    clampMalletToBounds(chaserMallet);
    prevPlayerPos.copy(playerMallet.position);
    prevPlayerGoaliePos.copy(playerGoalieMallet.position);
    prevGoaliePos.copy(goalieMallet.position);
    prevChaserPos.copy(chaserMallet.position);
    updateScoreDisplay();
    announcementEl.textContent = "10 maalista poikki!";

    function handleMalletCollision(malletGroup, malletVelocity) {
      const malletPos = malletGroup.position;
      const dx = puck.position.x - malletPos.x;
      const dz = puck.position.z - malletPos.z;
      const distSq = dx * dx + dz * dz;
      const minDist = puckRadius + malletRadius * 0.92;
      if (distSq >= minDist * minDist) {
        return;
      }
      const dist = Math.sqrt(distSq) || 0.0001;
      const nx = dx / dist;
      const nz = dz / dist;
      const overlap = minDist - dist;
      puck.position.x += nx * overlap;
      puck.position.z += nz * overlap;

      const malletSpeed = malletVelocity.length();
      const impactSpeed = clamp(malletSpeed * 0.8 + 3, 2, 12);
      puckVelocity.x = nx * impactSpeed;
      puckVelocity.z = nz * impactSpeed;
    }

    function clampMalletToBounds(mallet) {
      const bounds = mallet.userData?.bounds;
      const minZ = bounds?.minZ ?? playerMinZ;
      const maxZ = bounds?.maxZ ?? playerMaxZ;
      mallet.position.x = clamp(mallet.position.x, -rinkHalfWidth + malletRadius, rinkHalfWidth - malletRadius);
      mallet.position.z = clamp(mallet.position.z, minZ, maxZ);
      mallet.position.y = malletRestY;
    }

    function resolveMalletOverlap(malletA, malletB, weightA = 0.5, weightB = 0.5) {
      const totalWeight = weightA + weightB;
      const aShare = totalWeight === 0 ? 0.5 : weightA / totalWeight;
      const bShare = totalWeight === 0 ? 0.5 : weightB / totalWeight;
      const dx = malletB.position.x - malletA.position.x;
      const dz = malletB.position.z - malletA.position.z;
      const distSq = dx * dx + dz * dz;
      const minDist = malletRadius * 2 * 0.95;

      if (distSq === 0) {
        const angle = Math.random() * Math.PI * 2;
        const offset = malletRadius * 0.15;
        malletB.position.x += Math.cos(angle) * offset;
        malletB.position.z += Math.sin(angle) * offset;
        clampMalletToBounds(malletA);
        clampMalletToBounds(malletB);
        return;
      }

      if (distSq >= minDist * minDist) {
        return;
      }

      const dist = Math.sqrt(distSq);
      const overlap = minDist - dist;
      const nx = dx / dist;
      const nz = dz / dist;

      malletA.position.x -= nx * overlap * aShare;
      malletA.position.z -= nz * overlap * aShare;
      malletB.position.x += nx * overlap * bShare;
      malletB.position.z += nz * overlap * bShare;

      clampMalletToBounds(malletA);
      clampMalletToBounds(malletB);
    }

    function updateGoalie(delta) {
      goalieChangeTimer -= delta;
      if (goalieChangeTimer <= 0) {
        pickGoalieTarget();
      }
      const lerpFactor = 1 - Math.exp(-3.4 * delta);
      goalieMallet.position.lerp(goalieTarget, lerpFactor);
      clampMalletToBounds(goalieMallet);
    }

    function updatePlayerGoalie(delta) {
      const puckInDefensiveZone = puck.position.z > 0.6;
      if (puckInDefensiveZone) {
        const targetX = clamp(puck.position.x, -goalWidth / 2 + malletRadius, goalWidth / 2 - malletRadius);
        const targetZ = clamp(puck.position.z + 1.0, playerGoalieMinZ, playerGoalieMaxZ);
        playerGoalieTarget.set(targetX, malletRestY, targetZ);
      } else {
        playerGoalieTarget.set(0, malletRestY, playerGoalieHomeZ);
      }

      const lerpFactor = 1 - Math.exp(-4.1 * delta);
      playerGoalieMallet.position.lerp(playerGoalieTarget, lerpFactor);
      clampMalletToBounds(playerGoalieMallet);
    }

    function updateChaser(delta) {
      const puckSpeed = Math.hypot(puckVelocity.x, puckVelocity.z);
      const anticipatoryX = puck.position.x + puckVelocity.x * 0.25;
      const aggressiveness = puck.position.z > 0 ? 1.1 : 0.85;
      const baseOffset = puck.position.z > 0 ? 0.35 : 0.6;
      let desiredZ =
        puck.position.z - baseOffset - clamp(puckSpeed * 0.16, 0, 0.8);
      desiredZ = clamp(desiredZ, chaserMinZ, chaserMaxZ);
      chaserDesired.set(
        clamp(anticipatoryX, -rinkHalfWidth + chaserSideBuffer, rinkHalfWidth - chaserSideBuffer),
        malletRestY,
        desiredZ
      );

      const anticipation = 1 - Math.exp(-2.0 * delta);
      chaserTarget.lerp(chaserDesired, anticipation);
      const boostedLerp = 1 - Math.exp(-(6.2 + puckSpeed * 0.9) * delta);
      chaserMallet.position.lerp(chaserTarget, boostedLerp);
      clampMalletToBounds(chaserMallet);

      const dz = puck.position.z - chaserMallet.position.z;
      const dx = puck.position.x - chaserMallet.position.x;
      const distance = Math.sqrt(dx * dx + dz * dz);
      const influenceRadius = malletRadius * 2.1;
      if (distance < influenceRadius && puck.position.z > chaserMallet.position.z - 0.2) {
        const norm = distance || 0.0001;
        const nx = dx / norm;
        const nz = dz / norm;
        const pushStrength = clamp((influenceRadius - distance) * (8 + puckSpeed * 3) * aggressiveness, 0, 14);
        puckVelocity.x += nx * pushStrength * 0.45 * delta;
        puckVelocity.z -= nz * pushStrength * 0.65 * delta;
      }
    }

    function updatePuck(delta) {
      if (puckDropping) {
        const fallSpeed = 2.0;
        puck.position.y -= fallSpeed * delta;
        if (puck.position.y <= puckRestY) {
          puck.position.y = puckRestY;
          puckDropping = false;
        }
        return;
      }

      puck.position.x += puckVelocity.x * delta;
      puck.position.z += puckVelocity.z * delta;
      puck.position.y = puckRestY;

      const damping = Math.pow(0.998, delta * 60);
      puckVelocity.x *= damping;
      puckVelocity.z *= damping;

      const limitX = rinkHalfWidth - puckRadius - wallThickness * 0.25;
      if (puck.position.x <= -limitX) {
        puck.position.x = -limitX;
        puckVelocity.x = Math.abs(puckVelocity.x) * 0.92;
      } else if (puck.position.x >= limitX) {
        puck.position.x = limitX;
        puckVelocity.x = -Math.abs(puckVelocity.x) * 0.92;
      }

      const goalZoneX = goalWidth / 2 - puckRadius * 0.75;
      const wallLimitZ = rinkHalfDepth - puckRadius - wallThickness * 0.3;

      if (puck.position.z >= wallLimitZ) {
        if (Math.abs(puck.position.x) > goalZoneX) {
          puck.position.z = wallLimitZ;
          puckVelocity.z = -Math.abs(puckVelocity.z) * 0.93;
        } else if (puck.position.z > rinkHalfDepth + goalDepth) {
          registerGoal("own");
        }
      } else if (puck.position.z <= -wallLimitZ) {
        if (Math.abs(puck.position.x) > goalZoneX) {
          puck.position.z = -wallLimitZ;
          puckVelocity.z = Math.abs(puckVelocity.z) * 0.93;
        } else if (puck.position.z < -rinkHalfDepth - goalDepth) {
          registerGoal("player");
        }
      }

      const planarSpeed = Math.hypot(puckVelocity.x, puckVelocity.z);
      puck.rotation.x = 0;
      puck.rotation.z = 0;
      puck.rotation.y = (puck.rotation.y + planarSpeed * delta * 1.6) % (Math.PI * 2);
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.035);

      const oldPlayerPos = prevPlayerPos.clone();
      const oldPlayerGoaliePos = prevPlayerGoaliePos.clone();
      const oldGoaliePos = prevGoaliePos.clone();
      const oldChaserPos = prevChaserPos.clone();

      const playerLerp = 1 - Math.exp(-7.2 * delta);
      playerMallet.position.lerp(playerTarget, playerLerp);
      clampMalletToBounds(playerMallet);

      updateGoalie(delta);
      updatePlayerGoalie(delta);
      updateChaser(delta);
      updatePuck(delta);

      resolveMalletOverlap(playerMallet, goalieMallet, 0.5, 0.5);
      resolveMalletOverlap(playerMallet, chaserMallet, 0.25, 0.75);
      resolveMalletOverlap(playerMallet, playerGoalieMallet, 0.4, 0.6);
      resolveMalletOverlap(goalieMallet, chaserMallet, 0.4, 0.6);
      resolveMalletOverlap(chaserMallet, playerGoalieMallet, 0.45, 0.55);

      const playerVelocity2D = new THREE.Vector2(
        (playerMallet.position.x - oldPlayerPos.x) / Math.max(delta, 0.016),
        (playerMallet.position.z - oldPlayerPos.z) / Math.max(delta, 0.016)
      );
      const playerGoalieVelocity2D = new THREE.Vector2(
        (playerGoalieMallet.position.x - oldPlayerGoaliePos.x) / Math.max(delta, 0.016),
        (playerGoalieMallet.position.z - oldPlayerGoaliePos.z) / Math.max(delta, 0.016)
      );
      const goalieVelocity2D = new THREE.Vector2(
        (goalieMallet.position.x - oldGoaliePos.x) / Math.max(delta, 0.016),
        (goalieMallet.position.z - oldGoaliePos.z) / Math.max(delta, 0.016)
      );
      const chaserVelocity2D = new THREE.Vector2(
        (chaserMallet.position.x - oldChaserPos.x) / Math.max(delta, 0.016),
        (chaserMallet.position.z - oldChaserPos.z) / Math.max(delta, 0.016)
      );

      handleMalletCollision(playerMallet, playerVelocity2D);
      handleMalletCollision(playerGoalieMallet, playerGoalieVelocity2D);
      handleMalletCollision(goalieMallet, goalieVelocity2D);
      handleMalletCollision(chaserMallet, chaserVelocity2D);

      prevPlayerPos.copy(playerMallet.position);
      prevPlayerGoaliePos.copy(playerGoalieMallet.position);
      prevGoaliePos.copy(goalieMallet.position);
      prevChaserPos.copy(chaserMallet.position);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
