<!DOCTYPE html>
<html lang="fi">
<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Linux-videot | Linux asennus ja IT-tuki Porvoossa</title>
		<meta name="description" content="Linux Mint, Ubuntu ja Lubuntu -videot. Katso esittelyt ja valitse sopiva Linux käyttöjärjestelmä.">
		<meta name="keywords" content="Koodaus porvoo, Linux asennus Porvoo, Linux palvelu">
		<meta name="author" content="Simo Sirén">
	<style>
		.logo-anim {
			display: inline-block;
			transform: scale(3.5) translateY(160px);
			opacity: 0;
			transition: transform 2.7s cubic-bezier(0.22, 1, 0.36, 1), opacity 1.7s;
		}
		.logo-anim.visible {
			transform: scale(1) translateY(0);
			opacity: 1;
		}
		.word-anim {
			display: inline-block;
			opacity: 0;
			transform: scale(2.7) translateY(80px);
			transition: transform 1.9s cubic-bezier(0.22, 1, 0.36, 1), opacity 1.5s;
		}
		.word-anim.visible {
			opacity: 1;
			transform: scale(1) translateY(0);
		}
		.nav-links {
			display: flex;
			justify-content: center;
			gap: 2rem;
			margin: 2rem 0 2.5rem 0;
		}
		.nav-links a {
			font-size: 1.35rem;
			font-weight: bold;
			color: #fff;
			background: #2a4d69;
			padding: 0.7rem 2.2rem;
			border-radius: 2rem;
			text-decoration: none;
			box-shadow: 0 2px 8px rgba(42,77,105,0.10);
			transition: background 0.2s, color 0.2s, transform 0.15s;
			border: 2px solid #2a4d69;
		}
		.nav-links a:hover, .nav-links a:focus {
			background: #fff;
			color: #2a4d69;
			transform: scale(1.07);
			border: 2px solid #2a4d69;
		}
		body {
			margin: 0;
			font-family: 'Segoe UI', Arial, sans-serif;
			background: url('Laptop.png') no-repeat center center fixed;
			background-size: cover;
			min-height: 100vh;
			color: #222;
		}
		.overlay {
			background: rgba(255,255,255,0.65);
			min-height: 100vh;
			padding: 0;
		}
		.container {
			max-width: 800px;
			margin: 0 auto;
			padding: 2rem 1rem 3rem 1rem;
		}
		h1 {
			text-align: center;
			margin-top: 2rem;
			color: #2a4d69;
		}
		.card {
			background: rgba(255,255,255,0.85);
			border-radius: 12px;
			box-shadow: 0 2px 8px rgba(0,0,0,0.08);
			padding: 1.5rem;
			margin-bottom: 2rem;
		}
		.video-embed {
			position: relative;
			padding-bottom: 56.25%;
			height: 0;
			overflow: hidden;
			margin-bottom: 2rem;
		}
		.video-embed iframe {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			border: 0;
		}
		@media (max-width: 700px) {
			.container { max-width: 98vw; }
		}
	</style>
</head>
<body>
	<div class="overlay">
		   <div class="container">
			   <nav style="text-align:center; margin-top:1.5rem; margin-bottom:1.5rem;">
				   <a href="index.html">Etusivu</a>
				   <a href="esittely.html">Esittely</a>
				   <a href="videot.html">Linux esittely</a>
			   </nav>
				<h1>
					<img src="TuxiC.png" alt="Logo" class="logo-anim" id="tux-logo" style="height:2.5em; vertical-align:middle; margin-right:0.5em;">
					<span class="word-anim" id="word-linux">Linux</span>
					<span class="word-anim" id="word-service"> Service</span>
					<span class="word-anim" id="word-porvoo"> Porvoo</span>
				</h1>
			   <h2>Linux versioiden esittelyjä videoiden muodossa</h2>
			<div class="card">
				<h2>Mint</h2>
				<div class="video-embed">
					<iframe src="https://www.youtube.com/embed/NtKA2KV-fcU?start=0" allowfullscreen></iframe>
				</div>
				<h2>Ubuntu</h2>
				<div class="video-embed">
					<iframe src="https://www.youtube.com/embed/wpC53fY8HSQ?start=0" allowfullscreen></iframe>
				</div>
				<h2>Lubuntu</h2>
				<div class="video-embed">
					<iframe src="https://www.youtube.com/embed/ZVOZcU7fJ-A?start=0" allowfullscreen></iframe>
				</div>
			</div>
		</div>
	</div>
<script>
window.addEventListener('DOMContentLoaded', function() {
	var logo = document.getElementById('tux-logo');
	var word1 = document.getElementById('word-linux');
	var word2 = document.getElementById('word-service');
	var word3 = document.getElementById('word-porvoo');
	setTimeout(function() {
		logo.classList.add('visible');
		setTimeout(function() {
			word1.classList.add('visible');
			setTimeout(function() {
				word3.classList.add('visible');
				setTimeout(function() {
					word2.classList.add('visible');
				}, 1200);
			}, 1200);
		}, 1400);
	}, 350);
});
</script>
</body>
</html>
