<!DOCTYPE html>
<html lang="fi">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arpakone – Onnenpyörä</title>
  <style>
    :root {
      --bg: #0b1224;
      --panel: #111a2f;
      --accent: #5ac8ff;
      --text: #eaf1ff;
      --muted: #9db2d7;
      font-family: "Segoe UI", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 15% 20%, rgba(90, 200, 255, 0.18), transparent 40%),
                  radial-gradient(circle at 80% 0%, rgba(255, 121, 198, 0.16), transparent 38%),
                  conic-gradient(from 120deg, #050915 0%, #0f1b34 55%, #061026 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.6rem;
    }
    .card {
      width: min(960px, 100%);
      background: rgba(9, 14, 28, 0.88);
      border: 1px solid rgba(122, 220, 255, 0.25);
      border-radius: 18px;
      box-shadow:
        0 0 28px rgba(91, 200, 255, 0.22),
        0 22px 55px rgba(0, 0, 0, 0.45);
      padding: 1.6rem;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: -40% 10% auto 10%;
      height: 260px;
      background: radial-gradient(circle, rgba(255, 242, 171, 0.18), transparent 60%);
      filter: blur(25px);
      pointer-events: none;
    }
    h1 {
      margin: 0 0 1.2rem;
      text-align: center;
      letter-spacing: 0.03em;
    }
    .inputs {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.6rem;
      align-items: center;
    }
    input[type="text"] {
      width: 100%;
      padding: 0.75rem 0.9rem;
      border-radius: 10px;
      border: 1px solid rgba(120, 178, 255, 0.28);
      background: rgba(17, 30, 56, 0.75);
      color: var(--text);
      outline: none;
      transition: border 0.2s ease, box-shadow 0.2s ease;
    }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(90, 200, 255, 0.16);
    }
    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 1px solid rgba(120, 178, 255, 0.28);
      background: rgba(17, 30, 56, 0.75);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease;
    }
    .icon-btn:hover,
    .icon-btn:focus-visible {
      background: rgba(90, 200, 255, 0.2);
      border-color: rgba(90, 200, 255, 0.55);
      transform: translateY(-1px);
      outline: none;
    }
    .actions {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-top: 1.2rem;
    }
    .primary {
      background: linear-gradient(120deg, #5ac8ff, #7df3c9);
      color: #041024;
      border: none;
      padding: 0.95rem 1.4rem;
      border-radius: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 12px 28px rgba(90, 200, 255, 0.35), 0 0 18px rgba(255, 230, 111, 0.4);
    }
    .primary:hover,
    .primary:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.02);
      box-shadow: 0 16px 35px rgba(90, 200, 255, 0.38);
      outline: none;
    }
    .ghost {
      background: transparent;
      border: 1px solid rgba(120, 178, 255, 0.35);
      color: var(--text);
      padding: 0.95rem 1.2rem;
      border-radius: 12px;
      cursor: pointer;
      transition: border 0.15s ease, color 0.15s ease, transform 0.12s ease;
    }
    .ghost:hover,
    .ghost:focus-visible {
      border-color: var(--accent);
      color: #ffffff;
      transform: translateY(-1px);
      outline: none;
    }
    .error {
      color: #ffb4c2;
      margin-top: 0.6rem;
      min-height: 1.2em;
    }
    .wheel-stage {
      display: none;
      text-align: center;
      padding: 1rem 0.4rem 0.2rem;
      background: radial-gradient(circle at 50% 35%, rgba(255, 246, 189, 0.08), transparent 45%),
                  radial-gradient(circle at 20% 10%, rgba(122, 220, 255, 0.1), transparent 40%),
                  radial-gradient(circle at 80% 10%, rgba(255, 122, 176, 0.12), transparent 40%);
      border-radius: 18px;
    }
    canvas {
      max-width: 520px;
      width: 100%;
      aspect-ratio: 1 / 1;
      filter: drop-shadow(0 0 16px rgba(122, 220, 255, 0.35)) drop-shadow(0 0 24px rgba(255, 230, 111, 0.25));
    }
    .pointer {
      margin: 0 auto;
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 26px solid #ffed6f;
      filter:
        drop-shadow(0 0 8px rgba(255, 230, 111, 0.65))
        drop-shadow(0 4px 10px rgba(0, 0, 0, 0.35));
      transform: translateY(6px);
      background: linear-gradient(180deg, rgba(255, 230, 111, 0.9), rgba(255, 168, 54, 0.9));
    }
    .winner {
      margin-top: 1.1rem;
      font-size: 1.15rem;
      letter-spacing: 0.01em;
    }
    .fade {
      transition: opacity 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Arpakone</h1>

    <div id="form-stage" class="fade">
      <p style="margin:0 0 0.8rem; color: var(--muted);">Lisää sanat, joista Arpakone arpoo. Voit lisätä kenttiä plus-painikkeella.</p>
      <div id="inputs" class="inputs"></div>
      <div class="actions">
        <button class="icon-btn" id="add-input" aria-label="Lisää uusi kenttä">+</button>
        <button class="primary" id="spin-btn">Suorita arvonta</button>
      </div>
      <div id="error" class="error"></div>
    </div>

    <div id="wheel-stage" class="wheel-stage fade" aria-live="polite">
      <div class="pointer"></div>
      <canvas id="wheel" width="600" height="600"></canvas>
      <div id="winner" class="winner"></div>
      <div class="actions" style="justify-content:center; margin-top:1.2rem;">
        <button class="ghost" id="back-btn">Muokkaa sanoja</button>
        <button class="primary" id="respin-btn">Arvo uudestaan</button>
      </div>
    </div>
  </div>

  <script>
    const inputsContainer = document.getElementById('inputs');
    const addInputBtn = document.getElementById('add-input');
    const spinBtn = document.getElementById('spin-btn');
    const errorEl = document.getElementById('error');
    const formStage = document.getElementById('form-stage');
    const wheelStage = document.getElementById('wheel-stage');
    const backBtn = document.getElementById('back-btn');
    const respinBtn = document.getElementById('respin-btn');
    const wheelCanvas = document.getElementById('wheel');
    const ctx = wheelCanvas.getContext('2d');
    const winnerEl = document.getElementById('winner');

    let rotation = 0;
    let spinning = false;
    let lastFrameTime = 0;
    let activeWords = [];
    const vegasPalette = [
      '#ff007a', '#ff5f1f', '#ffdd1c', '#66ff66',
      '#00f0ff', '#7c4dff', '#ff33cc', '#20ffb5',
      '#ff6bcb', '#b6ff00', '#4de1ff', '#ff9f1c'
    ];
    const textPalette = [
      '#fff3d6', '#ffe66f', '#d9b8ff', '#a1f0ff',
      '#ffb6f3', '#d0ff5f', '#ffe5a3', '#b4ffef'
    ];
    let segmentColors = [];
    let textColors = [];
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;
    const lowPowerDevice =
      (typeof navigator.hardwareConcurrency === 'number' && navigator.hardwareConcurrency <= 4) ||
      (typeof navigator.deviceMemory === 'number' && navigator.deviceMemory <= 4);
    const lowEffects = prefersReducedMotion || (isTouchDevice && lowPowerDevice);
    const effects = lowEffects
      ? {
          rimOuterBlur: 12,
          rimInnerBlur: 8,
          sliceBlur: 5,
          sliceStrokeBlur: 4,
          textBlur: 0,
          hubBlur: 10
        }
      : {
          rimOuterBlur: 35,
          rimInnerBlur: 18,
          sliceBlur: 14,
          sliceStrokeBlur: 12,
          textBlur: 10,
          hubBlur: 24
        };

    const syncCanvasResolution = () => {
      const cssSize = Math.max(280, Math.round(wheelCanvas.clientWidth || 520));
      const dprCap = lowEffects ? 1.25 : 2;
      const dpr = Math.min(window.devicePixelRatio || 1, dprCap);
      const targetSize = Math.round(cssSize * dpr);
      if (wheelCanvas.width !== targetSize || wheelCanvas.height !== targetSize) {
        wheelCanvas.width = targetSize;
        wheelCanvas.height = targetSize;
      }
    };

    const assignColors = (words) => {
      segmentColors = words.map((_, i) => vegasPalette[i % vegasPalette.length]);
      textColors = words.map(() => textPalette[Math.floor(Math.random() * textPalette.length)]);
    };

    const createInputRow = (value = '') => {
      const row = document.createElement('div');
      row.className = 'input-row';

      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'Esim. Pizza, Elokuva, Uinti...';
      input.value = value;

      const removeBtn = document.createElement('button');
      removeBtn.className = 'icon-btn';
      removeBtn.type = 'button';
      removeBtn.textContent = '–';
      removeBtn.title = 'Poista kenttä';
      removeBtn.addEventListener('click', () => {
        row.remove();
        if (!inputsContainer.children.length) {
          addInput();
        }
      });

      row.appendChild(input);
      row.appendChild(removeBtn);
      return row;
    };

    const addInput = (value = '') => {
      inputsContainer.appendChild(createInputRow(value));
    };

    const getWords = () => {
      const words = [];
      inputsContainer.querySelectorAll('input').forEach((input) => {
        const val = input.value.trim();
        if (val) words.push(val);
      });
      return words;
    };

    const showError = (msg) => {
      errorEl.textContent = msg || '';
    };

    const toggleStages = (showWheel) => {
      if (showWheel) {
        formStage.style.opacity = '0';
        wheelStage.style.display = 'block';
        setTimeout(() => {
          formStage.style.display = 'none';
          wheelStage.style.opacity = '1';
        }, 220);
      } else {
        wheelStage.style.opacity = '0';
        setTimeout(() => {
          wheelStage.style.display = 'none';
          formStage.style.display = 'block';
          requestAnimationFrame(() => formStage.style.opacity = '1');
        }, 220);
      }
    };

    const drawWheel = (words) => {
      syncCanvasResolution();
      const { width, height } = wheelCanvas;
      const radius = width / 2;
      ctx.clearRect(0, 0, width, height);

      const slice = (Math.PI * 2) / words.length;

      // Outer glow rim
      ctx.save();
      ctx.translate(radius, radius);
      ctx.shadowBlur = effects.rimOuterBlur;
      ctx.shadowColor = 'rgba(255, 230, 111, 0.45)';
      ctx.beginPath();
      ctx.arc(0, 0, radius - 3, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255, 230, 111, 0.9)';
      ctx.lineWidth = 6;
      ctx.stroke();
      ctx.shadowBlur = effects.rimInnerBlur;
      ctx.shadowColor = 'rgba(122, 220, 255, 0.35)';
      ctx.beginPath();
      ctx.arc(0, 0, radius - 12, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(90, 200, 255, 0.6)';
      ctx.lineWidth = 4;
      ctx.stroke();
      ctx.restore();

      for (let i = 0; i < words.length; i++) {
        const start = rotation + i * slice;
        const end = start + slice;
        ctx.beginPath();
        ctx.moveTo(radius, radius);
        ctx.arc(radius, radius, radius - 6, start, end);
        ctx.closePath();
        const color = segmentColors[i] || vegasPalette[i % vegasPalette.length];
        ctx.fillStyle = color;
        ctx.shadowBlur = effects.sliceBlur;
        ctx.shadowColor = `${color}AA`;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(4, 10, 24, 0.95)';
        ctx.lineWidth = 3;
        ctx.shadowBlur = effects.sliceStrokeBlur;
        ctx.shadowColor = 'rgba(0, 0, 0, 0.45)';
        ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.save();
        ctx.translate(radius, radius);
        ctx.rotate(start + slice / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = textColors[i] || '#0b1224';
        ctx.font = `700 ${Math.max(14, Math.round(radius * 0.062))}px "Segoe UI", sans-serif`;
        ctx.shadowBlur = Math.max(effects.textBlur, 6);
        ctx.shadowColor = 'rgba(255, 255, 255, 0.65)';
        ctx.lineWidth = Math.max(2, Math.round(radius * 0.01));
        ctx.strokeStyle = 'rgba(5, 10, 20, 0.85)';
        ctx.strokeText(words[i], radius - 22, 6);
        ctx.fillText(words[i], radius - 22, 6);
        ctx.restore();
      }

      // Inner hub with glow
      ctx.save();
      ctx.translate(radius, radius);
      const hubRadius = 34;
      const gradient = ctx.createRadialGradient(0, 0, 6, 0, 0, hubRadius);
      gradient.addColorStop(0, '#fff7c2');
      gradient.addColorStop(1, '#ffc857');
      ctx.fillStyle = gradient;
      ctx.shadowBlur = effects.hubBlur;
      ctx.shadowColor = 'rgba(255, 230, 111, 0.85)';
      ctx.beginPath();
      ctx.arc(0, 0, hubRadius, 0, Math.PI * 2);
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#0b1224';
      ctx.stroke();
      ctx.restore();
    };

    const pickWinner = (words) => {
      const slice = (Math.PI * 2) / words.length;
      const angleAtPointer = (-Math.PI / 2 - rotation) % (Math.PI * 2); // pointer is at top, pointing down
      const angle = (angleAtPointer + Math.PI * 2) % (Math.PI * 2);
      const index = Math.floor(angle / slice);
      return words[index];
    };

    const spinWheel = () => {
      if (spinning) return;
      const words = activeWords;
      rotation = rotation % (Math.PI * 2);
      let velocity = 20 + Math.random() * 14; // rad/s initial
      const frictionPerSecond = 0.68 + Math.random() * 0.08; // frame-rate independent damping
      const minVelocity = 0.02;
      spinning = true;
      lastFrameTime = performance.now();
      winnerEl.textContent = 'Pyörä pyörii...';

      const animate = () => {
        if (!spinning) return;
        const now = performance.now();
        const dt = Math.min(0.05, Math.max(0.001, (now - lastFrameTime) / 1000));
        lastFrameTime = now;
        rotation += velocity * dt;
        velocity *= Math.pow(frictionPerSecond, dt);
        drawWheel(words);
        if (velocity < minVelocity) {
          spinning = false;
          const winner = pickWinner(words);
          winnerEl.textContent = `Valittu: ${winner}`;
          return;
        }
        requestAnimationFrame(animate);
      };
      animate();
    };

    // Event bindings
    addInputBtn.addEventListener('click', () => addInput());
    spinBtn.addEventListener('click', () => {
      const words = getWords();
      if (words.length < 2) {
        showError('Lisää vähintään kaksi sanaa.');
        return;
      }
      showError('');
      activeWords = words;
      assignColors(words);
      drawWheel(words);
      toggleStages(true);
      setTimeout(spinWheel, 120);
    });

    backBtn.addEventListener('click', () => {
      spinning = false;
      toggleStages(false);
    });

    respinBtn.addEventListener('click', () => {
      if (activeWords.length < 2) return;
      spinning = false;
      setTimeout(() => spinWheel(), 80);
    });

    window.addEventListener('resize', () => {
      if (wheelStage.style.display === 'block' && activeWords.length >= 2) {
        drawWheel(activeWords);
      } else {
        syncCanvasResolution();
      }
    });

    // Start with two inputs
    addInput('Pizza');
    addInput('Elokuva-ilta');
    syncCanvasResolution();
  </script>
</body>
</html>
